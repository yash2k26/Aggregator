services:
  server:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
